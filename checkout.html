<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - My Testing Restaurant</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="navbar-container">
            <div class="logo">
                <h1>🍽️ My Testing Restaurant</h1>
            </div>
            <ul class="nav-menu">
                <li><a href="index.html" class="nav-link">Home</a></li>
                <li><a href="menu.html" class="nav-link">Menu</a></li>
                <li><a href="cart.html" class="nav-link">Cart <span id="cart-count" class="cart-badge">0</span></a></li>
                <li><a href="account.html" class="nav-link" id="account-link">Login</a></li>
            </ul>
        </div>
    </nav>

    <!-- Page Title -->
    <div class="page-header">
        <h1>Checkout</h1>
    </div>

    <!-- Checkout Form -->
    <section class="checkout-section">
        <div class="container">
            <div class="checkout-wrapper">
                <!-- Left Column: Forms -->
                <div class="checkout-form">
                    <!-- Delivery Information -->
                    <div class="form-section">
                        <h2>Delivery Information</h2>
                        <form id="delivery-form">
                            <div class="form-group">
                                <label for="fullname">Full Name</label>
                                <input type="text" id="fullname" required>
                            </div>
                            <div class="form-group">
                                <label for="email">Email</label>
                                <input type="email" id="email" required>
                            </div>
                            <div class="form-group">
                                <label for="phone">Phone Number</label>
                                <input type="tel" id="phone" required>
                            </div>
                            <div class="form-group">
                                <label for="address">Delivery Address</label>
                                <input type="text" id="address" required>
                            </div>
                            <div class="form-row">
                                <div class="form-group">
                                    <label for="city">City</label>
                                    <input type="text" id="city" required>
                                </div>
                                <div class="form-group">
                                    <label for="zip">ZIP Code</label>
                                    <input type="text" id="zip" required>
                                </div>
                            </div>
                        </form>
                    </div>

                    <!-- Payment Information -->
                    <div class="form-section">
                        <h2>Payment Information</h2>
                        <div class="payment-methods">
                            <label class="payment-method">
                                <input type="radio" name="payment" value="credit" checked>
                                <span>Credit/Debit Card</span>
                            </label>
                            <label class="payment-method">
                                <input type="radio" name="payment" value="paypal">
                                <span>PayPal</span>
                            </label>
                            <label class="payment-method">
                                <input type="radio" name="payment" value="apple">
                                <span>Apple Pay</span>
                            </label>
                        </div>

                        <form id="payment-form">
                            <div class="form-group">
                                <label for="cardname">Cardholder Name</label>
                                <input type="text" id="cardname" required>
                            </div>
                            <div class="form-group">
                                <label for="cardnumber">Card Number</label>
                                <input type="text" id="cardnumber" placeholder="1234 5678 9012 3456" required>
                            </div>
                            <div class="form-row">
                                <div class="form-group">
                                    <label for="expiry">Expiry Date</label>
                                    <input type="text" id="expiry" placeholder="MM/YY" required>
                                </div>
                                <div class="form-group">
                                    <label for="cvv">CVV</label>
                                    <input type="text" id="cvv" placeholder="123" required>
                                </div>
                            </div>
                        </form>
                    </div>

                    <!-- Special Instructions -->
                    <div class="form-section">
                        <h2>Special Instructions</h2>
                        <textarea id="instructions" placeholder="Any special requests or dietary restrictions?" rows="4"></textarea>
                    </div>
                </div>

                <!-- Right Column: Order Summary -->
                <div class="order-summary">
                    <h2>Order Summary</h2>
                    <div id="summary-items">
                        <!-- Items will be loaded here -->
                    </div>
                    <div class="summary-divider"></div>
                    <div class="summary-item">
                        <span>Subtotal:</span>
                        <span><span id="summary-subtotal">0.00</span></span>
                    </div>
                    <div class="summary-item">
                        <span>Tax:</span>
                        <span>₦<span id="summary-tax">0.00</span></span>
                    </div>
                    <div class="summary-item">
                        <span>Delivery:</span>
                        <span>₦<span id="summary-delivery">5.00</span></span>
                    </div>
                    <div class="summary-total">
                        <span>Total:</span>
                        <span>₦<span id="summary-total">0.00</span></span>
                    </div>
                    <button class="btn btn-primary btn-block" onclick="processPayment()">Place Order</button>
                    <button class="btn btn-secondary btn-block" onclick="window.location.href='cart.html'">Back to Cart</button>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 My Testing Restaurant. All rights reserved.</p>
        </div>
    </footer>

    <script src="js/app.js"></script>
    <script>
        window.addEventListener('DOMContentLoaded', function() {
            displayCheckoutSummary();
            updateCartCount();
        });
    </script>
</body>
</html>
